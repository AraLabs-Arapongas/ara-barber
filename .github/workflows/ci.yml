name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint + Typecheck + Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: dummy
          SUPABASE_SECRET_KEY: dummy
          NEXT_PUBLIC_APP_BASE_HOST: aralabs.com.br
          NEXT_PUBLIC_PLATFORM_HOST: admin.aralabs.com.br
          NEXT_PUBLIC_DEV_BASE_HOST: lvh.me
          NEXT_PUBLIC_ENV: test

  # E2E smoke — escopo mínimo (proxy + render do dev index). Não toca DB
  # nem auth real; usa env dummy. Cobertura full-stack (login OTP, criar
  # appointment) entra quando tivermos projeto Supabase dedicado pra CI.
  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
