<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Seu código de acesso</title></head>
<body style="margin:0;padding:0;background-color:#f5f1e8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f5f1e8;">
    <tr><td align="center" style="padding:40px 20px;">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="background-color:#ffffff;border-radius:8px;max-width:600px;">
        <tr><td style="padding:32px 32px 8px 32px;">
          <p style="margin:0 0 8px 0;font-size:12px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#b9945a;">Aragenda</p>
          <h1 style="margin:0;font-size:24px;font-weight:600;color:#17343f;">Seu código de acesso</h1>
        </td></tr>
        <tr><td style="padding:16px 32px 24px 32px;font-size:16px;line-height:1.5;color:#333333;">
          Use o código abaixo pra entrar no painel do seu negócio. Vale por <strong>1 hora</strong>.
        </td></tr>
        <tr><td align="center" style="padding:0 32px 32px 32px;">
          <div style="padding:20px;background-color:#f5f1e8;border-radius:8px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:36px;letter-spacing:10px;font-weight:600;color:#17343f;">{{ .Token }}</div>
        </td></tr>
        <tr><td style="padding:20px 32px 16px 32px;font-size:14px;line-height:1.5;color:#666666;border-top:1px solid #f0f0f0;">
          Não pediu esse código? Pode ignorar este email — ninguém entra na sua conta sem o código.
        </td></tr>
        <tr><td style="padding:0 32px 32px 32px;font-size:13px;line-height:1.5;color:#999999;">
          Aragenda · um produto AraLabs
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
